name: ROS2 Iron CI

on: [push, pull_request, workflow_dispatch]

jobs:
  ros_build_test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/im2ag-introrob2026/robomaniak:latest

    permissions:
      contents: write
      packages: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Cache rosdep
        uses: actions/cache@v4
        with:
          path: ~/.ros/rosdep
          key: rosdep-${{ runner.os }}-${{ hashFiles('**/package.xml') }}
          restore-keys: rosdep-

      - name: Install Project Dependencies
        run: |
          apt-get update
          rosdep update
          rosdep install --from-paths src --ignore-src -y --rosdistro iron --skip-keys "behaviortree_cpp" --skip-keys "irobot_create_msgs" --skip-keys "vision_msgs"

      - name: Ensure ccache directory exists
        run: mkdir -p ~/.ccache

      - name: Setup ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Build Project with Coverage
        run: |
          . /opt/ros/iron/setup.sh
          . /root/create3_ws/install/setup.sh
          
          export CCACHE_DIR=$HOME/.ccache
          export PATH="/usr/lib/ccache:$PATH"
          
          colcon build \
            --symlink-install \
            --cmake-args \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_C_FLAGS="--coverage"

      - name: Run tests
        run: |
          . /opt/ros/iron/setup.sh
          . /root/create3_ws/install/setup.sh
          . install/setup.sh
          colcon test

      - name: Install coverage and documentation tools
        run: apt-get update && apt-get install -y gcovr doxygen graphviz

      - name: Generate coverage report
        run: |
          . /opt/ros/iron/setup.sh
          mkdir -p coverage
          gcovr -r . \
            --html \
            --html-details \
            -o coverage/index.html

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: 'coverage'

      - name: Comment coverage report on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: '### Code Coverage Report'
          message: |
            [View the full coverage report](${{ github.server_url }}/${{ github.repository }}/actions/artifacts/${{ github.run_id }})

      - name: Build documentation
        run: |
          . /opt/ros/iron/setup.sh
          mkdir -p doc
          doxygen Doxyfile

      - name: Extract metrics
        run: |
          mkdir -p public
          cat > public/metrics.json <<EOF
          {
            "timestamp": $(date +%s)
          }
          EOF

      - name: Prepare content
        run: |
          cp -r gh-pages/* public/
          cp -r coverage public/coverage/
          cp -r doc/html public/doxygen/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true