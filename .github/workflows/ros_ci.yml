name: ROS2 Iron CI

on:
  push:
    branches: [ main ]
    paths:
      - '**/Dockerfile'
      - '**/.github/workflows/ros_ci.yml'
      - '**/package.xml'
      - '**/CMakeLists.txt'
      - '**/src/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  ros_build_test:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        run: echo "IMAGE_NAME_LOWER=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Pull Docker image
        run: docker pull ${{ env.IMAGE_NAME_LOWER }}:latest

      - name: Ensure ccache directory exists
        run: mkdir -p ~/.ccache

      - name: Setup ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Build Project with Coverage
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/ros2_ws \
            -w /ros2_ws \
            ${{ env.IMAGE_NAME_LOWER }}:latest \
            /ros_entrypoint.sh /bin/bash -c "T
              apt-get update && apt-get install -y lcov doxygen graphviz &&
          
              source /root/create3_ws/install/setup.bash &&
          
              colcon build --symlink-install --cmake-args -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS='--coverage' -DCMAKE_C_FLAGS='--coverage' &&
              # colcon test --return-code-on-test-failure &&
              colcon test &&
          
              lcov --capture --directory build --output-file coverage.info &&
              lcov --remove coverage.info '/usr/*' '*/install/*' '*/test/*' --output-file coverage.info &&
              genhtml coverage.info --output-directory coverage &&
          
              doxygen Doxyfile
            "

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: 'coverage'

      - name: Comment coverage report on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: '### Code Coverage Report'
          message: |
            [View the full coverage report](${{ github.server_url }}/${{ github.repository }}/actions/artifacts/${{ github.run_id }})

      - name: Extract metrics
        run: |
          mkdir -p public
          cat > public/metrics.json <<EOF
          {
            "timestamp": $(date +%s)
          }
          EOF

      - name: Prepare content
        run: |
          cp -r gh-pages/* public/
          cp -r coverage public/coverage/
          cp -r doc/html public/doxygen/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true