name: ROS2 Jazzy CI

on: [push, pull_request, workflow_dispatch]

jobs:
  ros_build_test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/im2ag-introrob2026/robomaniak:latest

    permissions:
      contents: read
      packages: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Cache rosdep
        uses: actions/cache@v4
        with:
          path: ~/.ros/rosdep
          key: rosdep-${{ runner.os }}-${{ hashFiles('**/package.xml') }}
          restore-keys: rosdep-

      - name: Install Project Dependencies
        run: |
          rosdep update
          rosdep install --from-paths src --ignore-src -y --rosdistro jazzy

      - name: Setup ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ github.sha }}
          restore-keys: ccache-

      - name: Build Project with Coverage
        run: |
          . /opt/ros/jazzy/setup.sh
          export CCACHE_DIR=$HOME/.ccache
          colcon build \
            --cmake-args \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_C_FLAGS="--coverage" \
            -DVIDEO_CUSTOM_PATH=/usr/lib/ccache

      - name: Run tests
        run: |
          . /opt/ros/jazzy/setup.sh
          colcon test

      - name: Install gcovr
        run: apt-get update && apt-get install -y gcovr

      - name: Generate coverage report
        run: |
          . /opt/ros/jazzy/setup.sh
          mkdir -p coverage
          gcovr -r . \
            --html \
            --html-details \
            -o coverage/index.html

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: 'coverage'

      - name: Comment coverage report on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: '### Code Coverage Report'
          message: |
            [View the full coverage report](${{ github.server_url }}/${{ github.repository }}/actions/artifacts/${{ github.run_id }})
